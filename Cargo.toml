[workspace]
members = [
    "crates/htmlcut-core",
    "crates/htmlcut-cli",
    "xtask",
]
exclude = ["semver-baseline/htmlcut-core", "fuzz"]
resolver = "3"

[workspace.package]
version = "4.0.0"
edition = "2024"
description = "Extract and inspect HTML from files, URLs, and stdin with CSS selectors, literal or regex slicing, and structured reports."
license = "MIT"
authors = ["Ervins Strauhmanis"]
repository = "https://github.com/resoltico/HTMLCut"
homepage = "https://github.com/resoltico/HTMLCut"

[workspace.dependencies]
assert_cmd = "2.2.0"
clap = { version = "4.6.0", features = ["derive"] }
ego-tree = "0.11.0"
predicates = "3.1.4"
regex = "1.12.3"
scraper = { version = "0.26.0", default-features = false, features = ["errors"] }
schemars = { version = "1.0.4", features = ["url2"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sha2 = "0.10.9"
tempfile = "=3.27.0"
thiserror = "2.0.18"
ureq = { version = "3.3.0", default-features = false, features = ["gzip", "platform-verifier", "rustls"] }
url = { version = "2.5.8", features = ["serde"] }

[workspace.lints.rust]
unsafe_code = "warn"

[workspace.lints.clippy]
all = "warn"

[profile.dist]
inherits = "release"
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"

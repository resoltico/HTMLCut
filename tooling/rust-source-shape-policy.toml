version = 1

# This is an executable ownership contract, not a formatting preference. Every maintained
# first-party Rust source and test file resolves to the most-specific role below. Vendored parser
# patches and the frozen semver baseline are deliberately outside this inventory.

[[rules]]
path = "crates/htmlcut-core/src/tests/"
match = "prefix"
role = "core-test-scenario"
owner = "HTMLCut core"
rationale = "Each test module proves one public or internal core contract without becoming a second implementation."
split_trigger = "the scenario crosses unrelated core boundaries or exceeds any declared budget"
max_physical_lines = 650
max_items = 85
max_public_items = 0
max_imports = 24
max_functions = 65
max_decision_points = 190
max_match_arms = 90
allowed_internal_dependencies = ["crate", "catalog", "contracts", "diagnostics", "document", "extract", "inspect", "interop", "result", "schema", "selector_parse", "source", "tests", "wire"]

[[rules]]
path = "crates/htmlcut-core/src/interop/v1/types/"
match = "prefix"
role = "core-interop-contract"
owner = "HTMLCut interop"
rationale = "Versioned interop value objects and validation form a narrow public contract boundary."
split_trigger = "a file owns more than one document family or exceeds any declared budget"
max_physical_lines = 600
max_items = 55
max_public_items = 30
max_imports = 18
max_functions = 42
max_decision_points = 120
max_match_arms = 60
allowed_internal_dependencies = ["crate", "contracts", "interop", "selector_parse"]


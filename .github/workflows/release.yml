name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to build, publish, and verify (for example v4.0.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publication-${{ github.workflow }}-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  release-target-matrix:
    name: Compute release target matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Export release target matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          source ./scripts/release-targets.sh
          {
            echo 'matrix<<EOF'
            release_matrix_json
            echo EOF
          } >> "$GITHUB_OUTPUT"

  build-archives:
    name: Build release archives
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Read workspace version
        id: version
        run: |
          set -euo pipefail
          VERSION="$(awk -F'"' '/^version = "/ {print $2; exit}' Cargo.toml)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Workspace version: $VERSION"

      - name: Determine target release tag
        id: target-tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "${TAG}" ]; then
            echo "::error::target release tag is required"
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Validate release tag matches workspace version
        run: |
          set -euo pipefail
          TAG_VERSION="${{ steps.target-tag.outputs.version }}"
          WORKSPACE_VERSION="${{ steps.version.outputs.version }}"

          if [ "$TAG_VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "::error::Release tag version ($TAG_VERSION) does not match Cargo.toml version ($WORKSPACE_VERSION)"
            exit 1
          fi

      - name: Create release archives
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BASENAME="htmlcut-${VERSION}"

          mkdir -p dist
          git archive --format=zip --prefix="${BASENAME}/" -o "dist/${BASENAME}.zip" HEAD
          git archive --format=tar.gz --prefix="${BASENAME}/" -o "dist/${BASENAME}.tar.gz" HEAD

      - name: Upload archive artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-archives
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  build-standalone:
    name: Build standalone ${{ matrix.id }} executable
    needs:
      - release-target-matrix
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-target-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Install Linux musl toolchain packages
        if: ${{ matrix.needs_musl_tools }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target_triple }}"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target_triple }}

      - name: Read workspace version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(awk -F'"' '/^version = "/ {print $2; exit}' Cargo.toml)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Workspace version: $VERSION"

      - name: Determine target release tag
        id: target-tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "${TAG}" ]; then
            echo "::error::target release tag is required"
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Validate release tag matches workspace version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${{ steps.target-tag.outputs.version }}"
          WORKSPACE_VERSION="${{ steps.version.outputs.version }}"

          if [ "$TAG_VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "::error::Release tag version ($TAG_VERSION) does not match Cargo.toml version ($WORKSPACE_VERSION)"
            exit 1
          fi

      - name: Resolve artifact names
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          source ./scripts/release-targets.sh
          echo "binary=$(artifact_name_for_target "${{ matrix.target_triple }}")" >> "$GITHUB_OUTPUT"
          echo "checksum=$(checksum_name_for_target "${{ matrix.target_triple }}")" >> "$GITHUB_OUTPUT"

      - name: Build standalone executable
        shell: bash
        run: ./scripts/build-release-artifact.sh "${{ matrix.target_triple }}"

      - name: Smoke test standalone executable
        shell: bash
        run: |
          set -euo pipefail
          "./dist/${{ steps.artifact.outputs.binary }}" --version | grep "^htmlcut ${{ steps.version.outputs.version }}$"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/${{ steps.artifact.outputs.binary }}
            dist/${{ steps.artifact.outputs.checksum }}

      - name: Upload standalone artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact_bundle_name }}
          path: |
            dist/${{ steps.artifact.outputs.binary }}
            dist/${{ steps.artifact.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Build and publish release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - build-archives
      - build-standalone
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Publication logic must come from the maintained default branch so a rerun can
          # repair release tooling without mutating an existing tag.
          ref: ${{ github.event.repository.default_branch }}

      - name: Determine target release tag
        id: target-tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "${TAG}" ]; then
            echo "::error::target release tag is required"
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download archive artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-archives
          path: dist/

      - name: Download standalone artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: standalone-*
          path: dist/
          merge-multiple: true

      - name: Publish GitHub release idempotently
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.target-tag.outputs.tag }}
        run: ./scripts/publish-github-release.sh

      - name: Verify GitHub release handoff
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.target-tag.outputs.tag }}
        run: ./scripts/verify-github-release.sh

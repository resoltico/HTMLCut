name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to build, publish, and verify (for example v4.0.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publication-${{ github.workflow }}-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  release-target-matrix:
    name: Compute release target matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Export release target matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          source ./scripts/release-targets.sh
          {
            echo 'matrix<<EOF'
            release_matrix_json
            echo EOF
          } >> "$GITHUB_OUTPUT"

  build-archives:
    name: Build release archives
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Resolve target release tag and version
        id: release
        run: |
          set -euo pipefail
          TAG_INPUT="${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          TAG="$(./scripts/release-tag.sh "${TAG_INPUT}")"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create release archives
        run: |
          set -euo pipefail
          VERSION="${{ steps.release.outputs.version }}"
          source ./scripts/release-targets.sh
          BASENAME="$(release_source_archive_basename_for_version "$VERSION")"

          mkdir -p dist
          git archive --format=zip --prefix="${BASENAME}/" -o "dist/${BASENAME}.zip" HEAD
          git archive --format=tar.gz --prefix="${BASENAME}/" -o "dist/${BASENAME}.tar.gz" HEAD

      - name: Generate source archive attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/htmlcut-source-${{ steps.release.outputs.version }}.zip
            dist/htmlcut-source-${{ steps.release.outputs.version }}.tar.gz

      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-archives
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  build-standalone:
    name: Build standalone ${{ matrix.id }} package
    needs:
      - release-target-matrix
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-target-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Install Linux musl toolchain packages
        if: ${{ matrix.needs_musl_tools }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.95.0 --profile minimal
          rustup target add --toolchain 1.95.0 "${{ matrix.target_triple }}"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target_triple }}

      - name: Resolve target release tag and version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          TAG_INPUT="${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          TAG="$(./scripts/release-tag.sh "${TAG_INPUT}")"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve artifact names
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          source ./scripts/release-targets.sh
          VERSION="${{ steps.release.outputs.version }}"
          echo "package=$(release_package_name_for_target "$VERSION" "${{ matrix.target_triple }}")" >> "$GITHUB_OUTPUT"
          echo "compiled_binary=$(binary_name_for_target "${{ matrix.target_triple }}")" >> "$GITHUB_OUTPUT"

      - name: Build standalone executable
        shell: bash
        run: ./scripts/build-release-artifact.sh "${{ matrix.target_triple }}"

      - name: Smoke test standalone package
        shell: bash
        run: ./scripts/smoke-release-artifact.sh "${{ matrix.target_triple }}"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/${{ steps.artifact.outputs.package }}

      - name: Upload standalone artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_bundle_name }}
          path: dist/${{ steps.artifact.outputs.package }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Build and publish release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - build-archives
      - build-standalone
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # Publication logic must come from the maintained default branch so a rerun can
          # repair release tooling without mutating an existing tag.
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve target release tag and version
        id: release
        run: |
          set -euo pipefail
          TAG_INPUT="${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          TAG="$(./scripts/release-tag.sh "${TAG_INPUT}")"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download archive artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-archives
          path: dist/

      - name: Download standalone artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: standalone-*
          path: dist/
          merge-multiple: true

      - name: Build checksum manifest
        run: ./scripts/build-release-checksums.sh

      - name: Generate checksum manifest attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/htmlcut-${{ steps.release.outputs.version }}-checksums.txt

      - name: Publish GitHub release idempotently
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: ./scripts/publish-github-release.sh

      - name: Verify GitHub release handoff
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: ./scripts/verify-github-release.sh

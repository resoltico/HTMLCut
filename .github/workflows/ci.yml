name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-target-matrix:
    name: Compute release target matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Export release target matrix
        id: matrix
        shell: bash
        run: |
          set -euo pipefail
          source ./scripts/release-targets.sh
          {
            echo 'matrix<<EOF'
            release_matrix_json
            echo EOF
          } >> "$GITHUB_OUTPUT"

  devcontainer-changes:
    name: Detect devcontainer changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.filter.outputs.changed }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect devcontainer-relevant changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$base" "${{ github.sha }}" -- \
            '.devcontainer' \
            'scripts/validate-devcontainer.sh' \
            'scripts/devcontainer-check.sh' \
            'scripts/devcontainer-prepare-user-home.sh' \
            'scripts/devcontainer-bootstrap.sh' \
            'scripts/devcontainer-cli-helper.Dockerfile' \
            'scripts/common.sh' \
            'check.sh')
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  contributor-devcontainer:
    name: Contributor devcontainer gate
    needs: [devcontainer-changes]
    if: needs.devcontainer-changes.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      HTMLCUT_DEVCONTAINER_VOLUME_MODE: shared-ci
      HTMLCUT_DEVCONTAINER_REPO_COMMAND_PROBES: skip

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate contributor devcontainer contract
        shell: bash
        run: ./scripts/validate-devcontainer.sh

      - name: Run full maintainer gate through contributor devcontainer
        shell: bash
        run: ./scripts/devcontainer-check.sh

  cross-platform-rust-gate:
    name: Cross-platform Rust gate (${{ matrix.id }})
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-arm64
            runs_on: macos-15
            timeout_minutes: 30
          - id: windows-x64
            runs_on: windows-2022
            timeout_minutes: 150

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempts="$1"
            local delay_seconds="$2"
            shift 2
            local attempt=1
            until "$@"; do
              if (( attempt >= attempts )); then
                return 1
              fi
              sleep "${delay_seconds}"
              attempt=$((attempt + 1))
            done
          }
          retry 3 5 rustup toolchain install 1.95.0 --profile minimal
          retry 3 5 rustup component add clippy rustfmt --toolchain 1.95.0

      - name: Export contributor Rust QA tool inventory
        id: rust_qa_tools
        shell: bash
        run: |
          set -euo pipefail
          source ./scripts/contributor-rust-tools.sh
          echo "tool_csv=$(htmlcut_contributor_install_action_csv cargo-nextest cargo-audit cargo-deny cargo-outdated cargo-semver-checks)" >> "$GITHUB_OUTPUT"

      - name: Install Rust QA tools
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: ${{ steps.rust_qa_tools.outputs.tool_csv }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: cross-platform-${{ matrix.id }}

      - name: Exclude build directory from Windows Defender
        if: runner.os == 'Windows'
        shell: powershell
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}\target"

      - name: Check formatting
        shell: bash
        run: cargo fmt --check

      - name: Run Clippy
        shell: bash
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run workspace tests
        shell: bash
        run: cargo nextest run --workspace --lib --tests --all-features --locked

      - name: Check dependency freshness
        shell: bash
        run: cargo outdated --workspace --root-deps-only --exit-code 1

      - name: Check advisories
        shell: bash
        run: cargo audit -D warnings

      - name: Check dependency policy
        shell: bash
        run: cargo deny check -D warnings advisories bans licenses sources

      - name: Run semver gate
        shell: bash
        run: cargo xtask semver-check

  release-target-smoke:
    name: Release target smoke ${{ matrix.id }}
    needs:
      - release-target-matrix
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-target-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Linux musl toolchain packages
        if: ${{ matrix.needs_musl_tools }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          retry() {
            local attempts="$1"
            local delay_seconds="$2"
            shift 2
            local attempt=1
            until "$@"; do
              if (( attempt >= attempts )); then
                return 1
              fi
              sleep "${delay_seconds}"
              attempt=$((attempt + 1))
            done
          }
          retry 3 5 rustup toolchain install 1.95.0 --profile minimal
          retry 3 5 rustup target add --toolchain 1.95.0 "${{ matrix.target_triple }}"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target_triple }}

      - name: Read workspace version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(./scripts/workspace-version.sh)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build standalone package
        shell: bash
        run: ./scripts/build-release-artifact.sh "${{ matrix.target_triple }}"

      - name: Smoke test standalone package
        shell: bash
        run: ./scripts/smoke-release-artifact.sh "${{ matrix.target_triple }}"

  check:
    name: Check
    if: always()
    needs:
      - devcontainer-changes
      - contributor-devcontainer
      - cross-platform-rust-gate
      - release-target-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Confirm aggregate gate success
        shell: bash
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          set -euo pipefail
          if echo "$RESULTS" | grep -q '"failure"'; then
            echo "A required job failed."
            exit 1
          fi
          if echo "$RESULTS" | grep -q '"cancelled"'; then
            echo "A required job was cancelled."
            exit 1
          fi
          echo "All required jobs passed or were skipped."
